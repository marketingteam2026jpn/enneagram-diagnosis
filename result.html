<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #9B6DD7;
  --secondary: #C77DBA;
  --bg: #FFFBFE;
  --text: #2D2346;
  --text-sub: #7A6B8A;
  --radius-card: 20px;
  --radius-btn: 60px;
  --cta-gradient: linear-gradient(135deg, #C77DBA, #9B6DD7);
  --green: #4CAF50;
  --orange: #E07020;
  --red: #B22222;
  --yellow: #D4A017;
}

body {
  font-family: 'Noto Sans JP', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* ===== Sticky Header ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255, 251, 254, 0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(155, 109, 215, 0.08);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.header-back {
  position: absolute;
  left: 16px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(155, 109, 215, 0.08);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  text-decoration: none;
  color: var(--text);
}

.header-back:hover {
  background: rgba(155, 109, 215, 0.16);
}

.header-back svg {
  width: 18px;
  height: 18px;
}

.header-title {
  text-align: center;
}

.header-title-main {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #C77DBA, #9B6DD7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-title-sub {
  font-size: 10px;
  color: var(--text-sub);
  letter-spacing: 1px;
}

.header-share {
  position: absolute;
  right: 16px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(155, 109, 215, 0.08);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  color: var(--primary);
}

.header-share:hover {
  background: rgba(155, 109, 215, 0.16);
}

.header-share svg {
  width: 18px;
  height: 18px;
}

/* ===== Container ===== */
.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ===== Result Header ===== */
.result-header {
  padding: 40px 0 32px;
  text-align: center;
  border-radius: 0 0 32px 32px;
  margin-bottom: 24px;
}

.type-badge-area {
  margin-bottom: 24px;
}

.type-number {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 48px;
  line-height: 1.1;
  letter-spacing: -1px;
}

.type-name {
  font-size: 22px;
  font-weight: 700;
  margin-top: 4px;
}

.type-subtitle {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: var(--text-sub);
  margin-top: 2px;
}

.wing-badge {
  display: inline-block;
  margin-top: 12px;
  padding: 6px 18px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 600;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(155,109,215,0.15);
}

.type-catchcopy {
  font-size: 16px;
  font-style: italic;
  color: var(--text-sub);
  margin-top: 16px;
  padding: 0 16px;
  line-height: 1.7;
}

/* ===== Character Image ===== */
.character-area {
  display: flex;
  justify-content: center;
  margin: 24px 0;
}

.character-img-wrapper {
  width: 200px;
  height: 260px;
  border-radius: 24px;
  overflow: hidden;
  background: rgba(255,255,255,0.5);
  box-shadow: 0 8px 32px rgba(155,109,215,0.12);
}

.character-img-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.character-fallback {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 72px;
  color: #fff;
}

/* ===== Score Bars ===== */
.score-bars-section {
  margin: 32px 0;
}

.score-bars-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-sub);
  margin-bottom: 16px;
  text-align: center;
  letter-spacing: 1px;
}

.score-bar-row {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
  padding: 6px 12px;
  border-radius: 12px;
  transition: background 0.3s;
}

.score-bar-row.highlight {
  background: rgba(155,109,215,0.06);
}

.score-bar-label {
  width: 120px;
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-sub);
  display: flex;
  align-items: center;
  gap: 6px;
}

.score-bar-label .type-num {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 13px;
  width: 22px;
}

.score-bar-track {
  flex: 1;
  height: 10px;
  background: #f0ecf5;
  border-radius: 10px;
  overflow: hidden;
  margin: 0 10px;
}

.score-bar-fill {
  height: 100%;
  border-radius: 10px;
  width: 0;
  transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.score-bar-value {
  width: 40px;
  flex-shrink: 0;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 13px;
  text-align: right;
  color: var(--text-sub);
}

.score-bar-row.highlight .score-bar-label,
.score-bar-row.highlight .score-bar-value {
  color: var(--text);
  font-weight: 700;
}

/* ===== Confidence Badge ===== */
.confidence-section {
  display: flex;
  justify-content: center;
  margin: 28px 0;
}

.confidence-badge {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 24px;
  border-radius: 16px;
  background: #fff;
  box-shadow: 0 2px 12px rgba(155,109,215,0.08);
}

.confidence-circle {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  border: 3px solid;
}

.confidence-circle .value {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 18px;
  line-height: 1;
}

.confidence-circle .unit {
  font-size: 9px;
  font-weight: 600;
  line-height: 1;
  margin-top: 2px;
}

.confidence-info {
  flex: 1;
}

.confidence-label {
  font-size: 13px;
  font-weight: 700;
}

.confidence-desc {
  font-size: 11px;
  color: var(--text-sub);
  margin-top: 2px;
}

/* ===== Section Cards ===== */
.section-card {
  background: #fff;
  border-radius: var(--radius-card);
  padding: 28px 24px;
  margin-bottom: 20px;
  box-shadow: 0 2px 16px rgba(155,109,215,0.06);
  position: relative;
  overflow: hidden;
}

.section-card .top-border {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
}

.section-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title .icon {
  font-size: 20px;
}

/* ===== Overview ===== */
.overview-text {
  font-size: 15px;
  line-height: 1.9;
  color: var(--text);
  margin-bottom: 20px;
}

.motivation-fear-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.mf-card {
  padding: 16px;
  border-radius: 14px;
  text-align: center;
}

.mf-card.motivation {
  background: linear-gradient(135deg, rgba(155,109,215,0.08), rgba(199,125,186,0.08));
  border: 1px solid rgba(155,109,215,0.12);
}

.mf-card.fear {
  background: linear-gradient(135deg, rgba(178,34,34,0.06), rgba(224,112,32,0.06));
  border: 1px solid rgba(178,34,34,0.1);
}

.mf-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-sub);
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

.mf-value {
  font-size: 14px;
  font-weight: 600;
}

/* ===== Strengths & Weaknesses ===== */
.sw-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.sw-column h4 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.sw-column.strengths h4 {
  color: var(--green);
}

.sw-column.weaknesses h4 {
  color: var(--orange);
}

.sw-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 13px;
  margin-bottom: 8px;
  line-height: 1.5;
}

.sw-item .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 7px;
}

.strengths .dot { background: var(--green); }
.weaknesses .dot { background: var(--orange); }

.sw-item.blurred {
  filter: blur(5px);
  user-select: none;
  pointer-events: none;
}

/* ===== Premium Blur Overlay ===== */
.premium-overlay {
  position: relative;
}

.premium-overlay .blurred-content {
  filter: blur(6px);
  user-select: none;
  pointer-events: none;
}

.premium-lock-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(255,251,254,0.5);
  backdrop-filter: blur(2px);
  border-radius: var(--radius-card);
  z-index: 10;
}

.premium-lock-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--secondary), var(--primary));
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  box-shadow: 0 4px 16px rgba(155,109,215,0.3);
}

.premium-lock-icon svg {
  width: 22px;
  height: 22px;
  color: #fff;
}

.premium-lock-text {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
  cursor: pointer;
}

.premium-lock-text:hover {
  text-decoration: underline;
}

/* ===== Tritype ===== */
.tritype-display {
  text-align: center;
  margin-bottom: 20px;
}

.tritype-code {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 48px;
  letter-spacing: 8px;
  background: linear-gradient(135deg, var(--secondary), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.tritype-centers {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}

.tritype-center-card {
  padding: 14px 8px;
  border-radius: 14px;
  text-align: center;
  background: #f8f5fc;
  border: 1px solid rgba(155,109,215,0.1);
}

.tritype-center-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-sub);
  margin-bottom: 4px;
}

.tritype-center-type {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 20px;
}

.tritype-center-label {
  font-size: 10px;
  color: var(--text-sub);
  margin-top: 2px;
}

/* ===== Growth & Stress ===== */
.gs-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.gs-card {
  padding: 18px 14px;
  border-radius: 16px;
  border-left: 4px solid;
}

.gs-card.growth {
  background: rgba(76,175,80,0.06);
  border-left-color: var(--green);
}

.gs-card.stress {
  background: rgba(178,34,34,0.06);
  border-left-color: var(--red);
}

.gs-label {
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 8px;
}

.gs-card.growth .gs-label { color: var(--green); }
.gs-card.stress .gs-label { color: var(--red); }

.gs-direction {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 16px;
  margin-bottom: 8px;
}

.gs-text {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-sub);
}

/* ===== Premium Gate CTA ===== */
.premium-gate {
  background: linear-gradient(160deg, #E8D5F5 0%, #F5D5E8 40%, #FDE8D5 100%);
  border-radius: var(--radius-card);
  padding: 40px 28px;
  text-align: center;
  margin: 32px 0;
  position: relative;
  overflow: hidden;
}

.premium-gate::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: rgba(155,109,215,0.1);
}

.premium-gate-icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--secondary), var(--primary));
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  box-shadow: 0 4px 20px rgba(155,109,215,0.3);
}

.premium-gate-icon svg {
  width: 26px;
  height: 26px;
  color: #fff;
}

.premium-gate h3 {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 16px;
}

.premium-features {
  text-align: left;
  max-width: 320px;
  margin: 0 auto 24px;
}

.premium-feature-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  margin-bottom: 10px;
  font-weight: 500;
}

.premium-feature-item .check {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.premium-feature-item .check svg {
  width: 12px;
  height: 12px;
  color: #fff;
}

.premium-cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 16px 40px;
  border-radius: var(--radius-btn);
  background: linear-gradient(135deg, var(--secondary), var(--primary));
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 4px 20px rgba(155,109,215,0.35);
  transition: transform 0.2s, box-shadow 0.2s;
}

.premium-cta-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(155,109,215,0.45);
}

.premium-price {
  font-size: 13px;
  color: var(--text-sub);
  margin-top: 12px;
}

/* ===== Share Section ===== */
.share-section {
  margin: 32px 0;
}

.share-card-preview {
  background: linear-gradient(160deg, #E8D5F5 0%, #F5D5E8 40%, #FDE8D5 100%);
  border-radius: var(--radius-card);
  padding: 28px 20px;
  text-align: center;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.share-card-preview .share-card-badge {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--primary);
  margin-bottom: 8px;
}

.share-card-preview .share-card-type-num {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 40px;
  line-height: 1.1;
}

.share-card-preview .share-card-type-name {
  font-size: 20px;
  font-weight: 700;
  margin-top: 4px;
}

.share-card-preview .share-card-img {
  width: 120px;
  height: 156px;
  border-radius: 16px;
  overflow: hidden;
  margin: 16px auto;
  background: rgba(255,255,255,0.5);
}

.share-card-preview .share-card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.share-card-preview .share-card-catchcopy {
  font-size: 13px;
  font-style: italic;
  color: var(--text-sub);
  margin-top: 8px;
}

.share-card-preview .share-card-logo {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 1.5px;
  margin-top: 16px;
  opacity: 0.7;
}

.share-buttons {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 16px;
}

.share-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 22px;
  border-radius: var(--radius-btn);
  font-size: 14px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.2s, opacity 0.2s;
}

.share-btn:hover {
  transform: translateY(-1px);
  opacity: 0.9;
}

.share-btn.twitter {
  background: #000;
  color: #fff;
}

.share-btn.line {
  background: #06C755;
  color: #fff;
}

.share-btn.copy {
  background: rgba(155,109,215,0.1);
  color: var(--primary);
}

.share-btn svg {
  width: 18px;
  height: 18px;
}

.share-friend-link {
  text-align: center;
}

.share-friend-link a {
  font-size: 14px;
  color: var(--primary);
  font-weight: 600;
  text-decoration: none;
}

.share-friend-link a:hover {
  text-decoration: underline;
}

/* ===== Other Diagnoses ===== */
.other-diagnoses {
  margin: 40px 0;
}

.other-diagnoses h3 {
  font-size: 18px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 20px;
}

.other-diag-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.other-diag-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px 16px;
  text-align: center;
  box-shadow: 0 2px 12px rgba(155,109,215,0.06);
  text-decoration: none;
  color: var(--text);
  transition: transform 0.2s, box-shadow 0.2s;
  border: 1px solid rgba(155,109,215,0.08);
}

.other-diag-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(155,109,215,0.12);
}

.other-diag-icon {
  font-size: 32px;
  margin-bottom: 8px;
}

.other-diag-name {
  font-size: 14px;
  font-weight: 700;
}

.other-diag-desc {
  font-size: 11px;
  color: var(--text-sub);
  margin-top: 4px;
}

/* ===== Footer ===== */
.footer {
  padding: 32px 20px;
  text-align: center;
  border-top: 1px solid rgba(155,109,215,0.08);
  margin-top: 40px;
}

.footer-logo {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--secondary), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.footer-copy {
  font-size: 11px;
  color: var(--text-sub);
}

.footer-links {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 12px;
}

.footer-links a {
  font-size: 12px;
  color: var(--text-sub);
  text-decoration: none;
}

.footer-links a:hover {
  color: var(--primary);
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);

    window.location.href = 'quiz.html';
    return;
  }

  let result;
  try {
    result = JSON.parse(raw);

    window.location.href = 'quiz.html';
    return;
  }

  renderResult(result);
});

function renderResult(result) {
  const mainType = result.mainType || result.type || 1;
  const wing = result.wing || null;
  const scores = result.scores || {};
  const tritype = result.tritype || null;
  const confidence = result.confidence != null ? result.confidence : 75;

  const td = TYPE_DATA[mainType];
  if (!td) { window.location.href = 'quiz.html'; return; }

  // Determine wing name
  let wingLabel = '';
  if (wing && WING_KEYS[mainType] && WING_KEYS[mainType][wing]) {
    const wingKey = WING_KEYS[mainType][wing];
    wingLabel = td[wingKey] || '';
  }

  // Random gender
  const isMale = Math.random() > 0.5;
  const charImg = isMale ? td.imgMale : td.imgFemale;

  const main = document.getElementById('resultMain');
  main.innerHTML = buildHTML(mainType, td, wing, wingLabel, charImg, scores, confidence, tritype);

  // Animate score bars after render
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('.score-bar-fill').forEach(bar => {
        bar.style.width = bar.dataset.width + '%';
      });
    }, 100);
  });

  // Setup share handlers
  setupShare(mainType, td);
}

// ===== SHARE =====
function setupShare(mainType, td) {
  const shareText = `エニアグラム診断の結果、私はタイプ${mainType}「${td.name}」でした！\n${td.catchcopy}\n\n#AIKNOW #エニアグラム診断`;
  const shareUrl = window.location.href;

  document.getElementById('shareTwitter').addEventListener('click', () => {
    const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
    window.open(url, '_blank', 'width=550,height=420');
  });

  document.getElementById('shareLine').addEventListener('click', () => {
    const url = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}`;
    window.open(url, '_blank', 'width=550,height=420');
  });

  document.getElementById('shareCopy').addEventListener('click', () => {
    const text = shareText + '\n' + shareUrl;
    navigator.clipboard.writeText(text).then(() => {
      showToast('リンクをコピーしました');
    }).catch(() => {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('リンクをコピーしました');
    });
  });

  document.getElementById('headerShareBtn').addEventListener('click', () => {
    if (navigator.share) {
      navigator.share({ title: `エニアグラム タイプ${mainType}「${td.name}」`, text: shareText, url: shareUrl });
    } else {
      document.getElementById('shareCopy').click();
    }
  });
}

// ===== HELPERS =====
function hexToRGBA(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function scrollToPremium(e) {
  e.preventDefault();
  document.getElementById('premiumGate').scrollIntoView({ behavior: 'smooth' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
